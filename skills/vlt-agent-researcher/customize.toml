# DO NOT EDIT -- overwritten on every update.
#
# Agent customization surface for vlt-agent-researcher.
# Team overrides:     {project-root}/_bmad/custom/vlt-agent-researcher.toml
# Personal overrides: {project-root}/_bmad/custom/vlt-agent-researcher.user.toml

[agent]

# --- Metadata (install-time roster contract) ---
# Consumed by module.yaml:agents[] and `[agents.<code>]` in central config.

code = "researcher"
name = ""                       # summoned by role; owner may set a personal name, UIs fall back to title
title = "Researcher"
icon = "🔭"
description = "The vault's intellectual sparring partner — reaches into the world to build new knowledge and pushes you to learn."
agent_type = "memory"           # remembers across sessions via in-vault identity.md + thread.md (not a BMad sanctum)

# No override surface: this partner's behavior lives in its SKILL.md persona, the
# shipped operating contract, and its in-vault memory — identity.md (Bond/Self) +
# thread.md (Thread). Per agent-type guidance, memory agents default the
# customization surface to off.
